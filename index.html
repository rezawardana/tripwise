<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tripwise — Travel Budget</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5WP5B2LPBJ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-5WP5B2LPBJ');
</script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13; --card: #1a1a22; --card2: #22222e;
    --accent: #f0c040; --accent2: #ff6b6b; --green: #4ecb8d;
    --text: #f0eeea; --muted: #7a7a8c; --border: #2e2e3e; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    /* enough room for fixed nav + FAB + safe area */
    padding-bottom: calc(260px + env(safe-area-inset-bottom, 0px));
  }

  .header {
    padding: 52px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .btn-new-trip {
    background: var(--accent); color: #0f0f13; border: none; border-radius: 30px;
    padding: 9px 18px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
    cursor: pointer; white-space: nowrap; min-height: 38px;
  }

  .screen { display: none; padding: 20px 16px 80px; }
  .screen.active { display: block; }

  /* TRIP CARD */
  .trip-card {
    background: linear-gradient(135deg, #2a2038 0%, #1a2540 100%);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .trip-card::before { content: '✈'; position: absolute; right: 18px; top: 14px; font-size: 34px; opacity: 0.12; }
  .trip-destination { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 2px; padding-right: 40px; }
  .trip-dates { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .members-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .member-pill { background: rgba(255,255,255,0.07); border: 1px solid var(--border); border-radius: 99px; padding: 5px 12px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .member-avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #0f0f13; flex-shrink: 0; }
  .budget-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
  .budget-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .budget-amount { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; }
  .budget-remaining { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--green); }
  .budget-spent { font-family: 'Syne', sans-serif; font-size: 15px; color: var(--accent2); }
  .budget-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .progress-bar { background: rgba(255,255,255,0.08); border-radius: 99px; height: 6px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--green), var(--accent)); transition: width 0.5s ease; }
  .progress-fill.warning { background: linear-gradient(90deg, var(--accent), var(--accent2)); }

  .section-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* EXPENSE ITEM */
  .expense-item {
    background: var(--card);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .expense-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .expense-info { flex: 1; min-width: 0; }
  .expense-cat { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
  .expense-note { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .expense-split-info { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .expense-right { text-align: right; flex-shrink: 0; max-width: 110px; }
  .expense-amount { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
  .expense-myshare { font-size: 11px; color: var(--green); margin-top: 2px; }
  .expense-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .expense-paidby { font-size: 11px; color: var(--accent); margin-top: 2px; }
  .expense-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; padding-left: 2px; }
  .exp-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, border-color 0.2s;
  }
  .exp-btn:hover { color: var(--accent); border-color: var(--accent); }
  .exp-btn.del:hover { color: var(--accent2); border-color: var(--accent2); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 40px; display: block; margin-bottom: 12px; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    /* iOS safe area */
    padding-bottom: env(safe-area-inset-bottom, 0px);
    z-index: 50;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    padding: 10px 4px 10px;
    transition: color 0.2s;
    min-height: 60px;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn .icon { font-size: 22px; line-height: 1; }

  /* FAB — always 16px from right edge of the centered container, 20px above nav */
  .fab {
    position: fixed;
    bottom: calc(60px + env(safe-area-inset-bottom, 0px) + 16px);
    right: 16px;
    width: 58px;
    height: 58px;
    background: var(--accent);
    color: #0f0f13;
    border: none;
    border-radius: 50%;
    font-size: 30px;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(240,192,64,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 49;
  }
  /* On wider screens, keep FAB inside the 430px container */
  @media (min-width: 430px) {
    .fab { right: calc(50% - 430px/2 + 16px); }
  }
  .fab:active { transform: scale(0.94); }
  .fab.hidden { display: none; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    padding: 12px 20px calc(32px + env(safe-area-inset-bottom, 0px));
    width: 100%;
    max-width: 430px;
    animation: slideUp 0.28s ease;
    max-height: 90vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 20px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  input, select { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--card2); }

  .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cat-btn { background: var(--card2); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 6px; cursor: pointer; text-align: center; transition: all 0.15s; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; }
  .cat-btn .cat-icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .cat-btn.selected { border-color: var(--accent); background: rgba(240,192,64,0.12); color: var(--accent); }

  .member-toggle-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .member-toggle { background: var(--card2); border: 1.5px solid var(--border); border-radius: 99px; padding: 7px 14px; cursor: pointer; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .member-toggle.selected { border-color: var(--accent); background: rgba(240,192,64,0.12); color: var(--accent); }
  .member-toggle .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }

  /* live share preview */
  .share-preview { background: var(--card2); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--muted); margin-top: -8px; margin-bottom: 16px; }
  .share-preview strong { color: var(--green); font-family: 'Syne', sans-serif; }

  .member-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .member-input-row input { flex: 1; }
  .btn-add-member { background: var(--accent); color: #0f0f13; border: none; border-radius: 10px; padding: 12px 16px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .member-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--card2); border: 1px solid var(--border); border-radius: 99px; padding: 5px 10px; margin: 4px 4px 4px 0; font-size: 13px; }
  .member-tag button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }

  .btn-submit { width: 100%; background: var(--accent); color: #0f0f13; border: none; border-radius: 12px; padding: 15px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 4px; }
  .btn-cancel { width: 100%; background: none; border: 1px solid var(--border); border-radius: 12px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--muted); cursor: pointer; margin-top: 8px; }

  /* SETTLE UP */
  .settle-card { background: var(--card); border-radius: 14px; padding: 18px; margin-bottom: 10px; border: 1px solid var(--border); }
  .settle-card-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .settle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .settle-row:last-child { border-bottom: none; padding-bottom: 0; }
  .settle-names { font-size: 14px; }
  .settle-names .arrow { color: var(--muted); margin: 0 6px; }
  .settle-amount { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
  .settle-amount.owe { color: var(--accent2); }
  .settle-amount.owed { color: var(--green); }
  .settle-zero { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border-radius: 14px; padding: 16px; border: 1px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; word-break: break-all; }
  .stat-value.green { color: var(--green); } .stat-value.red { color: var(--accent2); } .stat-value.yellow { color: var(--accent); }

  .cat-breakdown { background: var(--card); border-radius: 14px; padding: 16px; border: 1px solid var(--border); margin-bottom: 10px; }
  .cat-breakdown-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .cat-row:last-child { margin-bottom: 0; }
  .cat-row-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
  .cat-row-name { font-size: 13px; flex: 1; white-space: nowrap; }
  .cat-row-bar-wrap { flex: 2; background: rgba(255,255,255,0.06); border-radius: 99px; height: 5px; }
  .cat-row-bar { height: 5px; border-radius: 99px; transition: width 0.4s; }
  .cat-row-amount { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; min-width: 68px; text-align: right; }

  .trip-list-item { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; transition: border-color 0.2s; }
  .trip-list-item:hover { border-color: var(--accent); }
  .trip-list-item.active-trip { border-color: var(--accent); background: rgba(240,192,64,0.06); }
  .trip-list-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
  .trip-list-sub { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .trip-delete-btn { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 16px; cursor: pointer; padding: 0; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: color 0.2s, border-color 0.2s; }
  .trip-delete-btn:hover { color: var(--accent2); border-color: var(--accent2); }
  .badge { display: inline-block; background: var(--accent); color: #0f0f13; border-radius: 99px; font-size: 10px; font-weight: 700; padding: 2px 8px; font-family: 'Syne', sans-serif; margin-left: 6px; vertical-align: middle; }

  .no-trip-state { text-align: center; padding: 60px 20px 20px; color: var(--muted); }
  .no-trip-state .big-emoji { font-size: 52px; display: block; margin-bottom: 16px; }
  .no-trip-state h2 { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .no-trip-state p { font-size: 14px; line-height: 1.5; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 40px; display: block; margin-bottom: 12px; }

  /* SPLIT TYPE TOGGLE */
  .split-type-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .split-type-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--card2); color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .split-type-btn.selected { border-color: var(--accent); background: rgba(240,192,64,0.12); color: var(--accent); }

  /* CUSTOM SPLIT INPUTS */
  .custom-split-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .custom-split-name { font-size: 13px; font-weight: 600; min-width: 70px; display: flex; align-items: center; gap: 6px; }
  .custom-split-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .custom-split-input { flex: 1; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .custom-split-input:focus { border-color: var(--accent); }
  .custom-split-total { font-size: 12px; color: var(--muted); margin-top: 4px; margin-bottom: 8px; }
  .custom-split-total.mismatch { color: var(--accent2); }
  .custom-split-total.match { color: var(--green); }

  /* FEES ROW */
  .fees-row { display: flex; gap: 10px; align-items: flex-start; }
  .fees-row .form-group { flex: 1; margin-bottom: 16px; }
  .fees-row label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; line-height: 1.4; min-height: 28px; }
  .fees-row input { width: 100%; }

  /* TAX BREAKDOWN */
  .tax-breakdown { background: var(--card2); border-radius: 12px; padding: 14px; margin-bottom: 16px; border: 1px solid var(--border); }
  .tax-breakdown-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; font-family: 'Syne', sans-serif; }
  .tax-breakdown-row { display: flex; align-items: center; gap: 6px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
  .tax-breakdown-row:last-child { border-bottom: none; padding-bottom: 0; margin-top: 2px; border-top: 1px solid var(--border); padding-top: 8px; }
  .tax-breakdown-name { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; min-width: 64px; flex-shrink: 0; white-space: nowrap; }
  .tax-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .tax-breakdown-parts { font-size: 10px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tax-breakdown-final { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; white-space: nowrap; flex-shrink: 0; margin-left: 4px; }
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; padding: 24px; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: var(--card); border-radius: 20px; padding: 28px 24px 20px; width: 100%; max-width: 340px; border: 1px solid var(--border); animation: popIn 0.2s ease; }
  @keyframes popIn { from { transform: scale(0.92); opacity:0; } to { transform: scale(1); opacity:1; } }
  .confirm-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .confirm-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-actions button { flex: 1; padding: 13px; border-radius: 12px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; border: none; }
  .confirm-cancel-btn { background: var(--card2); color: var(--muted); border: 1px solid var(--border) !important; }
  .confirm-ok-btn { background: var(--accent2); color: #fff; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Trip<span>wise</span></div>
  <button class="btn-new-trip" onclick="openNewTripModal()">+ New Trip</button>
</div>

<div class="screen active" id="screen-home"><div id="home-content"></div></div>
<div class="screen" id="screen-expenses"><div id="expenses-content"></div></div>
<div class="screen" id="screen-settle"><div id="settle-content"></div></div>
<div class="screen" id="screen-trips"><div id="trips-content"></div></div>

<button class="fab" id="fab-add" onclick="openAddExpenseModal(null)">+</button>

<!-- CUSTOM CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">Are you sure?</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="confirm-cancel-btn" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-ok-btn" id="confirm-ok-btn">Delete</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="showScreen('home')" id="nav-home"><span class="icon">🏠</span>Home</button>
  <button class="nav-btn" onclick="showScreen('expenses')" id="nav-expenses"><span class="icon">📋</span>Expenses</button>
  <button class="nav-btn" onclick="showScreen('settle')" id="nav-settle"><span class="icon">🤝</span>Settle Up</button>
  <button class="nav-btn" onclick="showScreen('trips')" id="nav-trips"><span class="icon">✈️</span>Trips</button>
</div>

<!-- MODAL: NEW TRIP -->
<div class="modal-overlay" id="modal-trip">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="trip-modal-title">New Trip ✈️</div>
    <div class="form-group">
      <label>Destination</label>

<script>
const CATEGORIES = [
  { id:'food', label:'Food', icon:'🍜', color:'#ff9f43' },
  { id:'transport', label:'Transport', icon:'🚌', color:'#48dbfb' },
  { id:'hotel', label:'Hotel', icon:'🏨', color:'#a29bfe' },
  { id:'activities', label:'Activities', icon:'🎟️', color:'#fd79a8' },
  { id:'shopping', label:'Shopping', icon:'🛍️', color:'#55efc4' },
  { id:'other', label:'Other', icon:'💡', color:'#dfe6e9' },
];
const MEMBER_COLORS = ['#f0c040','#4ecb8d','#48dbfb','#a29bfe','#fd79a8','#ff9f43'];

let state = { trips:[], expenses:[], activeTrip:null };
let newTripMembers = [];
let editingExpenseId = null; // null = new, string = editing

function load() {
  // Try current key first, then fall back to older keys to migrate data
  const keys = ['tripwise_v3', 'tripwise_v2', 'tripwise_v1'];
  for (const key of keys) {
    try {
      const s = localStorage.getItem(key);
      if (s) {
        state = JSON.parse(s);
        // Re-save under current key so future loads are fast
        localStorage.setItem('tripwise_v3', JSON.stringify(state));
        break;
      }
    } catch(e) {}
  }
}
function save() { localStorage.setItem('tripwise_v3', JSON.stringify(state)); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function memberColor(idx) { return MEMBER_COLORS[idx % MEMBER_COLORS.length]; }

function fmt(amount, currency) {
  const sym={USD:'$',EUR:'€',GBP:'£',JPY:'¥',IDR:'Rp ',SGD:'S$',THB:'฿',MYR:'RM ',AUD:'A$',CAD:'C$'};
  const s=sym[currency]||currency+' ';
  if(currency==='IDR'||currency==='JPY') return s+Math.round(amount).toLocaleString();
  return s+parseFloat(amount).toFixed(2);
}

function getActiveTrip() { return state.trips.find(t=>t.id===state.activeTrip)||null; }
function getTripExpenses(id) { return state.expenses.filter(e=>e.tripId===id); }

// KEY FIX: my share = amount / splitBetween.length (only if I'm in the split)
function getMyShare(expense, myName) {
  if(expense.splitType==='custom' && expense.customAmounts) {
    return expense.customAmounts[myName]||0;
  }
  const splitters = expense.splitBetween||[];
  if(splitters.length===0) return expense.amount;
  if(!splitters.includes(myName)) return 0;
  return expense.amount / splitters.length;
}

// Total spent = sum of MY share across all expenses
function getMyTotalSpent(tripId) {
  const trip = state.trips.find(t=>t.id===tripId);
  if(!trip) return 0;
  return getTripExpenses(tripId).reduce((sum, e) => sum + getMyShare(e, trip.myName), 0);
}

// For settle up: total PAID by each person (full amount they fronted)
function getTotalPaidBy(tripId, name) {
  return getTripExpenses(tripId).filter(e=>e.paidBy===name).reduce((s,e)=>s+e.amount,0);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  const showFab = name==='home'||name==='expenses';
  document.getElementById('fab-add').classList.toggle('hidden', !showFab);
  render();
}

function render() { renderHome(); renderExpenses(); renderSettle(); renderTrips(); }

function memberPill(name, idx) {
  return `<div class="member-pill"><div class="member-avatar" style="background:${memberColor(idx)}">${name[0].toUpperCase()}</div>${name}</div>`;
}

function renderHome() {
  const trip = getActiveTrip();
  const el = document.getElementById('home-content');
  if(!trip) {
    el.innerHTML=`<div class="no-trip-state"><span class="big-emoji">🗺️</span><h2>No Active Trip</h2><p>Tap "+ New Trip" to get started.</p></div>`;
    return;
  }
  const mySpent = getMyTotalSpent(trip.id);
  const remaining = trip.budget - mySpent;
  const pct = trip.budget > 0 ? Math.min((mySpent/trip.budget)*100, 100) : 0;
  const warn = pct > 80;
  const recent = getTripExpenses(trip.id).slice(-3).reverse();
  const members = trip.members||[];

  el.innerHTML=`
    <div class="trip-card">
      <div class="trip-destination">${trip.destination}</div>
      <div class="trip-dates">${trip.name}</div>
      <div class="members-row">${members.map((m,i)=>memberPill(m,i)).join('')}</div>
      <div class="budget-row">
        <div><div class="budget-label">My Budget</div><div class="budget-amount">${fmt(trip.budget,trip.currency)}</div></div>
        <div style="text-align:right">
          <div class="budget-label">Remaining</div>
          <div class="budget-remaining" style="${remaining<0?'color:var(--accent2)':''}">${fmt(Math.abs(remaining),trip.currency)}${remaining<0?' over':''}</div>
        </div>
      </div>
      <div class="budget-row" style="margin-bottom:4px">
        <div>
          <div class="budget-label">My Share Spent</div>
          <div class="budget-spent">${fmt(mySpent,trip.currency)}</div>
          <div class="budget-note">Your portion of all expenses</div>
        </div>
        <div style="text-align:right;color:var(--muted);font-size:13px;align-self:flex-end">${Math.round(pct)}%</div>
      </div>
      <div class="progress-bar"><div class="progress-fill ${warn?'warning':''}" style="width:${pct}%"></div></div>
    </div>
    <div class="section-title">Recent Expenses</div>
    ${recent.length===0
      ? `<div class="empty-state"><span class="emoji">🧾</span>No expenses yet. Tap + to add one.</div>`
      : recent.map(e=>expHTML(e,trip)).join('')}`;
}

function expHTML(e, trip) {
  const cat = CATEGORIES.find(c=>c.id===e.category)||CATEGORIES[5];
  const members = trip.members||[];
  const splitNames = (e.splitBetween||[]).join(', ');
  const isCustom = e.splitType==='custom' && e.customAmounts;
  const perPerson = isCustom ? null : (e.splitBetween&&e.splitBetween.length>0 ? e.amount/e.splitBetween.length : e.amount);
  const splitInfo = isCustom ? `Custom · Split: ${splitNames}` : `Split: ${splitNames}${perPerson?' · '+fmt(perPerson,trip.currency)+'/person':''}`;
  const myShare = getMyShare(e, trip.myName);
  const iAmIn = isCustom ? (e.customAmounts[trip.myName]||0)>0 : (e.splitBetween||[]).includes(trip.myName);
  return `<div class="expense-item">
    <div class="expense-icon" style="background:${cat.color}22">${cat.icon}</div>
    <div class="expense-info">
      <div class="expense-cat">${cat.label}</div>
      <div class="expense-note">${e.note||'—'}</div>
      <div class="expense-split-info">${splitInfo}</div>
    </div>
    <div class="expense-right">
      <div class="expense-amount">${fmt(e.amount,trip.currency)}</div>
      <div class="expense-date">${e.date}</div>
      <div class="expense-paidby">by ${e.paidBy||'?'}</div>
      ${iAmIn ? `<div class="expense-myshare">My share: ${fmt(myShare,trip.currency)}</div>` : `<div style="font-size:11px;color:var(--muted)">Not in split</div>`}
    </div>
    <div class="expense-actions">
      <button class="exp-btn" onclick="openAddExpenseModal('${e.id}')" title="Edit">✏️</button>
      <button class="exp-btn del" onclick="deleteExpense('${e.id}')" title="Delete">✕</button>
    </div>
  </div>`;
}

function renderExpenses() {
  const trip = getActiveTrip();
  const el = document.getElementById('expenses-content');
  if(!trip) { el.innerHTML=`<div class="no-trip-state"><span class="big-emoji">📋</span><h2>No Active Trip</h2><p>Select or create a trip first.</p></div>`; return; }
  const exps = getTripExpenses(trip.id).slice().reverse();
  el.innerHTML=`<div class="section-title">${trip.destination} — All Expenses</div>`
    +(exps.length===0?`<div class="empty-state"><span class="emoji">🧾</span>No expenses yet.</div>`:exps.map(e=>expHTML(e,trip)).join(''));
}

function computeBalances(trip) {
  const members = trip.members||[];
  const net = {};
  members.forEach(m=>net[m]=0);
  getTripExpenses(trip.id).forEach(e=>{
    const payer=e.paidBy;
    if(!payer) return;
    if(net[payer]!==undefined) net[payer]+=e.amount;

    if(e.splitType==='custom' && e.customAmounts) {
      // custom: each person owes their specific amount
      Object.entries(e.customAmounts).forEach(([m,amt])=>{
        if(net[m]!==undefined) net[m]-=(amt||0);
      });
    } else {
      // equal split
      const splitters=e.splitBetween||[];
      if(splitters.length===0) return;
      const share=e.amount/splitters.length;
      splitters.forEach(s=>{ if(net[s]!==undefined) net[s]-=share; });
    }
  });
  return net;
}

function simplifyDebts(net) {
  const creditors=[],debtors=[];
  Object.entries(net).forEach(([name,bal])=>{
    if(bal>0.005) creditors.push({name,bal});
    else if(bal<-0.005) debtors.push({name,bal:-bal});
  });
  creditors.sort((a,b)=>b.bal-a.bal); debtors.sort((a,b)=>b.bal-a.bal);
  const txns=[];
  let ci=0,di=0;
  while(ci<creditors.length&&di<debtors.length) {
    const amt=Math.min(creditors[ci].bal,debtors[di].bal);
    txns.push({from:debtors[di].name,to:creditors[ci].name,amount:amt});
    creditors[ci].bal-=amt; debtors[di].bal-=amt;
    if(creditors[ci].bal<0.005) ci++;
    if(debtors[di].bal<0.005) di++;
  }
  return txns;
}

function renderSettle() {
  const trip=getActiveTrip();
  const el=document.getElementById('settle-content');
  if(!trip){el.innerHTML=`<div class="no-trip-state"><span class="big-emoji">🤝</span><h2>No Active Trip</h2><p>Select or create a trip first.</p></div>`;return;}
  const members=trip.members||[];
  const net=computeBalances(trip);
  const txns=simplifyDebts(net);
  el.innerHTML=`
    <div class="section-title" style="margin-top:4px">Settle Up</div>
    <div class="settle-card">
      <div class="settle-card-title">💸 Payments to Make</div>
      ${txns.length===0?`<div class="settle-zero">✅ All settled up!</div>`
        :txns.map(t=>{
          const fi=members.indexOf(t.from),ti=members.indexOf(t.to);
          return `<div class="settle-row">
            <div class="settle-names">
              <span style="color:${memberColor(fi)};font-weight:600">${t.from}</span>
              <span class="arrow">→</span>
              <span style="color:${memberColor(ti)};font-weight:600">${t.to}</span>
            </div>
            <div class="settle-amount owe">${fmt(t.amount,trip.currency)}</div>
          </div>`;
        }).join('')}
    </div>
    <div class="settle-card">
      <div class="settle-card-title">📊 Total Paid by Each</div>
      ${members.map((m,i)=>`<div class="settle-row">
        <div style="color:${memberColor(i)};font-weight:600;font-size:14px">${m}</div>
        <div class="settle-amount">${fmt(getTotalPaidBy(trip.id,m),trip.currency)}</div>
      </div>`).join('')}
    </div>
    <div class="settle-card">
      <div class="settle-card-title">⚖️ Net Balance</div>
      ${members.map((m,i)=>{
        const b=net[m]||0;
        const label=Math.abs(b)<0.01?'✅ Settled':b>0?`Gets back ${fmt(b,trip.currency)}`:`Owes ${fmt(-b,trip.currency)}`;
        return `<div class="settle-row">
          <div style="color:${memberColor(i)};font-weight:600;font-size:14px">${m}</div>
          <div class="settle-amount ${b>0.01?'owed':b<-0.01?'owe':''}">${label}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function renderTrips() {
  const el=document.getElementById('trips-content');
  if(state.trips.length===0){el.innerHTML=`<div class="no-trip-state"><span class="big-emoji">✈️</span><h2>No Trips Yet</h2><p>Tap "+ New Trip" to create one.</p></div>`;return;}
  el.innerHTML=`<div class="section-title" style="margin-top:4px">My Trips</div>`+
    state.trips.map(t=>{
      const mySpent=getMyTotalSpent(t.id),pct=t.budget>0?Math.round((mySpent/t.budget)*100):0;
      const isActive=t.id===state.activeTrip;
      return `<div class="trip-list-item ${isActive?'active-trip':''}" onclick="setActiveTrip('${t.id}')">
        <div style="flex:1;min-width:0">
          <div class="trip-list-name">${t.destination}${isActive?'<span class="badge">Active</span>':''}</div>
          <div class="trip-list-sub">${t.name} · ${(t.members||[]).length} people · my share ${fmt(mySpent,t.currency)}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="trip-delete-btn" onclick="event.stopPropagation();openEditTripModal('${t.id}')" title="Edit">✏️</button>
          <button class="trip-delete-btn" onclick="event.stopPropagation();deleteTrip('${t.id}')" title="Delete">🗑</button>
        </div>
      </div>`;
    }).join('');
}

function setActiveTrip(id){state.activeTrip=id;save();showScreen('home');}

// ---- CUSTOM CONFIRM ----
let confirmCallback = null;
function showConfirm(title, msg, onOk) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  confirmCallback = onOk;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('open');
  confirmCallback = null;
}
document.getElementById('confirm-ok-btn').onclick = function() {
  if(confirmCallback) confirmCallback();
  closeConfirm();
};

function deleteTrip(id) {
  showConfirm('Delete Trip', 'This will permanently delete the trip and all its expenses. This cannot be undone.', () => {
    state.trips = state.trips.filter(t=>t.id!==id);
    state.expenses = state.expenses.filter(e=>e.tripId!==id);
    if(state.activeTrip===id) state.activeTrip = state.trips[0]?.id||null;
    save(); render();
  });
}

function deleteExpense(id) {
  showConfirm('Delete Expense', 'Remove this expense from the trip?', () => {
    state.expenses = state.expenses.filter(e=>e.id!==id);
    save(); render();
  });
}

// ---- NEW / EDIT TRIP ----
let editingTripId = null;

function addMember(){
  const inp=document.getElementById('member-input');
  const name=inp.value.trim();
  if(!name||newTripMembers.includes(name)){inp.value='';return;}
  newTripMembers.push(name); inp.value=''; renderMembersPreview();
}
function removeMember(name){newTripMembers=newTripMembers.filter(m=>m!==name);renderMembersPreview();}
function renderMembersPreview(){
  document.getElementById('members-preview').innerHTML=newTripMembers.map((m,i)=>
    `<span class="member-tag"><span style="color:${memberColor(i+1)}">${m}</span><button onclick="removeMember('${m}')">✕</button></span>`
  ).join('');
}

function openNewTripModal(){
  editingTripId = null;
  newTripMembers=[];
  ['trip-dest','trip-name','trip-budget','trip-myname','member-input'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('trip-modal-title').textContent = 'New Trip ✈️';
  document.getElementById('trip-submit-btn').textContent = 'Create Trip';
  // reset currency to IDR default
  document.getElementById('trip-currency').value = 'IDR';
  renderMembersPreview();
  document.getElementById('modal-trip').classList.add('open');
}

function openEditTripModal(tripId){
  const trip = state.trips.find(t=>t.id===tripId);
  if(!trip) return;
  editingTripId = tripId;
  const members = trip.members||[];
  const friends = members.filter(m=>m!==trip.myName);
  newTripMembers = [...friends];
  document.getElementById('trip-dest').value = trip.destination;
  document.getElementById('trip-name').value = trip.name;
  document.getElementById('trip-budget').value = trip.budget;
  document.getElementById('trip-currency').value = trip.currency;
  document.getElementById('trip-myname').value = trip.myName||members[0]||'';
  document.getElementById('member-input').value = '';
  document.getElementById('trip-modal-title').textContent = 'Edit Trip ✏️';
  document.getElementById('trip-submit-btn').textContent = 'Save Changes';
  renderMembersPreview();
  document.getElementById('modal-trip').classList.add('open');
}

function saveTrip(){
  const dest=document.getElementById('trip-dest').value.trim();
  const name=document.getElementById('trip-name').value.trim();
  const budget=parseFloat(document.getElementById('trip-budget').value);
  const currency=document.getElementById('trip-currency').value;
  const myName=document.getElementById('trip-myname').value.trim()||'Me';
  if(!dest||!budget||isNaN(budget)){alert('Please fill in destination and budget.');return;}
  const members=[myName,...newTripMembers];

  if(editingTripId) {
    // UPDATE existing trip
    const idx = state.trips.findIndex(t=>t.id===editingTripId);
    if(idx>-1){
      state.trips[idx] = {...state.trips[idx], destination:dest, name:name||dest, budget, currency, members, myName};
    }
    save(); closeModal('modal-trip'); render();
  } else {
    // CREATE new trip
    const trip={id:uid(),destination:dest,name:name||dest,budget,currency,members,myName};
    state.trips.push(trip); state.activeTrip=trip.id;
    save(); closeModal('modal-trip'); render(); showScreen('home');
  }
}

// ---- ADD / EDIT EXPENSE ----
let selectedCategory='food';
let selectedPaidBy=null;
let selectedSplitBetween=[];
let selectedSplitType='equal'; // 'equal' or 'custom'
let customAmounts={}; // {memberName: amount}

function setSplitType(type) {
  selectedSplitType = type;
  document.getElementById('split-type-equal').classList.toggle('selected', type==='equal');
  document.getElementById('split-type-custom').classList.toggle('selected', type==='custom');
  document.getElementById('equal-split-section').style.display = type==='equal' ? '' : 'none';
  document.getElementById('custom-split-section').style.display = type==='custom' ? '' : 'none';
  updateSharePreview();
}

function openAddExpenseModal(expenseId) {
  const trip=getActiveTrip();
  if(!trip){alert('Please create or select a trip first.');return;}

  editingExpenseId = expenseId || null;
  document.getElementById('expense-modal-title').textContent = expenseId ? 'Edit Expense ✏️' : 'Add Expense 💸';

  if(expenseId) {
    const exp = state.expenses.find(e=>e.id===expenseId);
    if(!exp) return;
    selectedCategory = exp.category;
    selectedPaidBy = exp.paidBy;
    selectedSplitType = exp.splitType||'equal';
    selectedSplitBetween = [...(exp.splitBetween||[])];
    customAmounts = exp.customAmounts ? {...exp.customAmounts} : {};
    document.getElementById('exp-amount').value = exp.amount;
    document.getElementById('exp-note').value = exp.note||'';
    document.getElementById('exp-date').value = exp.date;
  } else {
    selectedCategory='food';
    selectedPaidBy=trip.myName||trip.members[0];
    selectedSplitType='equal';
    selectedSplitBetween=[...trip.members];
    customAmounts={};
    trip.members.forEach(m => customAmounts[m]=0);
    document.getElementById('exp-amount').value='';
    document.getElementById('exp-note').value='';
    document.getElementById('exp-date').value=new Date().toISOString().slice(0,10);
    document.getElementById('exp-tax').value='';
    document.getElementById('exp-admin').value='';
  }

  renderCatGrid();
  renderPaidByRow(trip);
  renderSplitRow(trip);
  renderCustomSplitInputs(trip);
  setSplitType(selectedSplitType);
  updateSharePreview();
  document.getElementById('modal-expense').classList.add('open');
}

function renderCatGrid(){
  document.getElementById('cat-grid').innerHTML=CATEGORIES.map(c=>`
    <button class="cat-btn ${c.id===selectedCategory?'selected':''}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>${c.label}
    </button>`).join('');
}
function renderPaidByRow(trip){
  document.getElementById('paidby-row').innerHTML=(trip.members||[]).map((m,i)=>`
    <button class="member-toggle ${m===selectedPaidBy?'selected':''}" onclick="selectPaidBy('${m}')">
      <div class="dot" style="background:${memberColor(i)}"></div>${m}
    </button>`).join('');
}
function renderSplitRow(trip){
  document.getElementById('splitbetween-row').innerHTML=(trip.members||[]).map((m,i)=>`
    <button class="member-toggle ${selectedSplitBetween.includes(m)?'selected':''}" onclick="toggleSplit('${m}')">
      <div class="dot" style="background:${memberColor(i)}"></div>${m}
    </button>`).join('');
}
function renderCustomSplitInputs(trip) {
  const members = trip.members||[];
  document.getElementById('custom-split-inputs').innerHTML = members.map((m,i)=>`
    <div class="custom-split-row">
      <div class="custom-split-name">
        <div class="custom-split-dot" style="background:${memberColor(i)}"></div>${m}
      </div>
      <input class="custom-split-input" type="number" min="0" step="0.01"
        placeholder="0" value="${customAmounts[m]||''}"
        oninput="customAmounts['${m}']=parseFloat(this.value)||0;updateSharePreview()">
    </div>`).join('');
}
function updateSharePreview(){
  const trip=getActiveTrip(); if(!trip) return;
  const el=document.getElementById('share-preview');

  if(selectedSplitType==='equal') {
    const amount=parseFloat(document.getElementById('exp-amount').value)||0;
    const n=selectedSplitBetween.length||1;
    const myShare=selectedSplitBetween.includes(trip.myName)?amount/n:0;
    if(amount===0){el.innerHTML='Enter an amount to see your share.';return;}
    el.innerHTML=`Your share: <strong>${fmt(myShare,trip.currency)}</strong> &nbsp;(${fmt(amount,trip.currency)} ÷ ${n} people)`;
  } else {
    const totalBill = parseFloat(document.getElementById('exp-amount').value)||0;
    const tax = parseFloat(document.getElementById('exp-tax').value)||0;
    const adminFee = parseFloat(document.getElementById('exp-admin').value)||0;
    const members = trip.members||[];
    const orderTotal = Object.values(customAmounts).reduce((s,v)=>s+(v||0),0);
    const activeMembers = members.filter(m=>(customAmounts[m]||0)>0);
    const adminPerPerson = activeMembers.length>0 ? adminFee/activeMembers.length : 0;

    // compute final amounts
    const finalAmounts = {};
    members.forEach(m => {
      const order = customAmounts[m]||0;
      if(order===0 && adminFee===0) { finalAmounts[m]=0; return; }
      const taxShare = orderTotal>0 ? (order/orderTotal)*tax : 0;
      const adminShare = order>0 ? adminPerPerson : 0;
      finalAmounts[m] = order + taxShare + adminShare;
    });
    const computedTotal = Object.values(finalAmounts).reduce((s,v)=>s+v,0);

    // show breakdown
    const taxBreakdownEl = document.getElementById('tax-breakdown');
    const totalEl = document.getElementById('custom-split-total');

    if((tax>0||adminFee>0) && orderTotal>0) {
      taxBreakdownEl.style.display='';
      taxBreakdownEl.innerHTML=`
        <div class="tax-breakdown-title">Final breakdown per person</div>
        ${members.map((m,i)=>{
          const order=customAmounts[m]||0;
          if(order===0) return '';
          const taxShare=orderTotal>0?(order/orderTotal)*tax:0;
          const adminShare=adminPerPerson;
          const final=order+taxShare+adminShare;
          const compact = n => {
            if(n>=1000000) return 'Rp'+(n/1000000).toFixed(1)+'jt';
            if(n>=1000) return 'Rp'+(n/1000).toFixed(0)+'K';
            return 'Rp'+Math.round(n);
          };
          const parts=[];
          parts.push(compact(order));
          if(tax>0) parts.push(`+${compact(taxShare)} tax`);
          if(adminFee>0) parts.push(`+${compact(adminShare)} adm`);
          return `<div class="tax-breakdown-row">
            <div class="tax-breakdown-name"><div class="tax-dot" style="background:${memberColor(i)}"></div>${m}</div>
            <div class="tax-breakdown-parts">${parts.join(' ')}</div>
            <div class="tax-breakdown-final" style="color:${memberColor(i)}">${fmt(final,trip.currency)}</div>
          </div>`;
        }).join('')}
        <div class="tax-breakdown-row">
          <div class="tax-breakdown-name" style="color:var(--muted)">Total</div>
          <div></div>
          <div class="tax-breakdown-final" style="color:var(--accent)">${fmt(computedTotal,trip.currency)}</div>
        </div>`;
    } else {
      taxBreakdownEl.style.display='none';
    }

    // validate
    const expectedTotal = orderTotal + tax + adminFee;
    const diff = Math.abs(expectedTotal - totalBill);
    if(totalBill===0){el.innerHTML='Enter an amount to see your share.'; totalEl.innerHTML=''; return;}

    const match = diff < 1;
    totalEl.className = 'custom-split-total '+(match?'match':'mismatch');
    if(orderTotal===0) {
      totalEl.innerHTML = 'Enter order amounts above';
    } else {
      const parts = [];
      parts.push(`Orders ${fmt(orderTotal,trip.currency)}`);
      if(tax>0) parts.push(`Tax ${fmt(tax,trip.currency)}`);
      if(adminFee>0) parts.push(`Admin ${fmt(adminFee,trip.currency)}`);
      totalEl.innerHTML = match
        ? `✅ ${parts.join(' · ')} = ${fmt(expectedTotal,trip.currency)}`
        : `⚠️ ${parts.join(' · ')} = ${fmt(expectedTotal,trip.currency)} · Bill is ${fmt(totalBill,trip.currency)} · Diff ${fmt(diff,trip.currency)}`;
    }

    const myShare = finalAmounts[trip.myName]||0;
    const hasFees = tax>0||adminFee>0;
    el.innerHTML=`Your share: <strong>${fmt(myShare,trip.currency)}</strong>${hasFees?' (incl. fees)':''}`;
  }
}
function selectCat(id){selectedCategory=id;renderCatGrid();}
function selectPaidBy(name){
  selectedPaidBy=name;
  const trip=getActiveTrip();if(trip)renderPaidByRow(trip);
}
function toggleSplit(name){
  if(selectedSplitBetween.includes(name)){
    if(selectedSplitBetween.length===1)return;
    selectedSplitBetween=selectedSplitBetween.filter(m=>m!==name);
  } else {
    selectedSplitBetween.push(name);
  }
  const trip=getActiveTrip();if(trip)renderSplitRow(trip);
  updateSharePreview();
}

function saveExpense(){
  const amount=parseFloat(document.getElementById('exp-amount').value);
  const note=document.getElementById('exp-note').value.trim();
  const date=document.getElementById('exp-date').value;
  if(!amount||isNaN(amount)){alert('Please enter an amount.');return;}
  if(!selectedPaidBy){alert('Please select who paid.');return;}

  let splitBetween, customAmountsFinal, splitType;

  if(selectedSplitType==='equal') {
    if(selectedSplitBetween.length===0){alert('Please select who to split with.');return;}
    splitBetween = [...selectedSplitBetween];
    customAmountsFinal = null;
    splitType = 'equal';
  } else {
    // custom split — compute final amounts with tax + admin fee
    const tax = parseFloat(document.getElementById('exp-tax').value)||0;
    const adminFee = parseFloat(document.getElementById('exp-admin').value)||0;
    const orderTotal = Object.values(customAmounts).reduce((s,v)=>s+(v||0),0);
    const activeMembers = Object.keys(customAmounts).filter(m=>(customAmounts[m]||0)>0);
    const adminPerPerson = activeMembers.length>0 ? adminFee/activeMembers.length : 0;
    const expectedTotal = orderTotal + tax + adminFee;
    const diff = Math.abs(expectedTotal - amount);
    if(diff >= 1){
      alert(`Orders (${orderTotal}) + Tax (${tax}) + Admin (${adminFee}) = ${expectedTotal} must equal total bill (${amount}). Difference: ${Math.round(diff)}`);
      return;
    }
    // build final amounts
    const finalAmounts = {};
    Object.keys(customAmounts).forEach(m => {
      const order = customAmounts[m]||0;
      if(order===0) return;
      const taxShare = orderTotal>0 ? (order/orderTotal)*tax : 0;
      const adminShare = adminPerPerson;
      finalAmounts[m] = Math.round((order + taxShare + adminShare) * 100) / 100;
    });
    splitBetween = Object.keys(finalAmounts).filter(m=>(finalAmounts[m]||0)>0);
    customAmountsFinal = finalAmounts;
    splitType = 'custom';
  }

  const expData = {category:selectedCategory, amount, note, date, paidBy:selectedPaidBy, splitBetween, splitType, customAmounts:customAmountsFinal};

  if(editingExpenseId) {
    const idx=state.expenses.findIndex(e=>e.id===editingExpenseId);
    if(idx>-1) state.expenses[idx]={...state.expenses[idx],...expData};
  } else {
    state.expenses.push({id:uid(), tripId:state.activeTrip, ...expData});
  }
  save();closeModal('modal-expense');render();
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

load();render();
</script>
